name: Deploy Pipeline

on:
  push:
    branches: [ "feature/dockerizacion", "main" ]

jobs:
  deploy:
    # Usamos ubuntu-latest porque el log #7 muestra que usaste 
    # la acción de Tailscale para conectar desde fuera.
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: SSH Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/pipeline/pipeline
            git pull origin feature/dockerizacion || git pull origin main
            
            # Tu build optimizado
            docker build -t mi-web-app:latest .
            
            # Tu despliegue indestructible
            docker rm -f web-produccion || true
            docker run -d \
              --name web-produccion \
              --restart always \
              -p 12345:8000 \
              mi-web-app:latest
            
            docker image prune -f
