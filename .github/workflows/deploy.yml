name: Deploy Pipeline

on:
  push:
    branches: [ "feature/dockerizacion", "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: SSH Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}        # <--- Corregido a REMOTE_HOST
          username: ${{ secrets.REMOTE_USER }}    # <--- Corregido a REMOTE_USER
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ~/pipeline/pipeline
            git pull origin feature/dockerizacion || git pull origin main
            docker build -t mi-web-app:latest .
            docker rm -f web-produccion || true
            docker run -d --name web-produccion --restart always -p 12345:8000 mi-web-app:latest
            docker image prune -f
