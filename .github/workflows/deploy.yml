name: Deploy
on:
  push:
    branches: [ "feature/dockerizacion" ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: SSH Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/pipeline/pipeline
            git pull origin feature/dockerizacion
            docker build -t mi-web-app:latest .
            docker rm -f web-produccion || true
            docker run -d --name web-produccion --restart always -p 12345:8000 mi-web-app:latest
            docker image prune -f
