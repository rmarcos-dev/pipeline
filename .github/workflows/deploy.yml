name: Deploy Directo Self-Hosted

on:
  push:
    branches: [ "feature/dockerizacion", "main" ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Construir y Levantar Docker
        run: |
          docker build -t mi-web-app:latest .
          docker rm -f web-produccion || true
          docker run -d --name web-produccion --restart always -p 12345:8000 mi-web-app:latest
          docker image prune -f
