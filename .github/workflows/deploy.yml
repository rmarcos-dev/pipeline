name: Deploy Pipeline

on:
  push:
    branches:
      - feature/dockerizacion

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      # --- NUEVO PASO: ESTO UNE A GITHUB A TU RED PRIVADA ---
      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}

      - name: Desplegar vía SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            cd ~/pipeline/pipeline
            git pull origin feature/dockerizacion
            docker build -t mi-pipeline:latest .
            docker run --rm mi-pipeline:latest
